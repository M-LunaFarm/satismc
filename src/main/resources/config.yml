settings:
  language: ko_kr
  debug: false
  tick-interval: 40
  maintenance-check-interval: 1200
  dirty-save-interval: 200
  max-machines-per-cycle: 200
  max-backfill-cycles: 60
  resource-node-link-radius: 3
  allow-coop-build: false
  protect-spawn-island: true
economy:
  mode: VAULT_PLAYER
storage:
  default-capacity: 10000
limits:
  base-machines-per-island: 128
  recovery-machine-types:
    - harvester_t1
    - planter_t1
    - miner_drill_t1
    - bio_generator_t1
    - conveyor_t1
