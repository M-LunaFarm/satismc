name: SatisSkyFactory
main: kr.seungmin.satisskyfactory.SatisSkyFactoryPlugin
version: ${version}
api-version: "1.21"
depend: [SuperiorSkyblock2]
softdepend: [Vault, PlaceholderAPI]
author: LeeSeungmin
commands:
  factory:
    description: SatisSkyFactory command
    usage: /factory help
    permission: satisskyfactory.use
  sfactory:
    description: SatisSkyFactory command
    usage: /sfactory help
    permission: satisskyfactory.use
permissions:
  satisskyfactory.use:
    default: true
  satisskyfactory.admin:
    default: op
  satisskyfactory.debug:
    default: op
