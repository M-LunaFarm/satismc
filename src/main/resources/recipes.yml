recipes:
  grind_wheat:
    machines: [grinder_t1]
    min-tier: 1
    inputs:
      wheat: 2
    outputs:
      flour: 1
    byproducts:
      wheat_seeds: 1
    power-cost: 5.0
  grind_iron:
    machines: [grinder_t1]
    min-tier: 1
    inputs:
      iron_ore: 2
    outputs:
      crushed_iron: 1
    power-cost: 5.0
  smelt_crushed_iron:
    machines: [furnace_t1]
    input:
      crushed_iron: 1
    output:
      iron_ingot: 1
    power: 7.0
  assemble_plate:
    machine: assembler_t1
    input:
      iron_ingot: 2
    output:
      iron_plate: 1
    power: 8.0
  assemble_machine_parts:
    machines: [assembler_t1]
    min-tier: 2
    inputs:
      iron_plate: 2
    outputs:
      machine_parts: 1
    quality-chance: 0.03
    power-cost: 8.0
  package_bread:
    machines: [packager_t1]
    min-tier: 2
    inputs:
      flour: 3
    outputs:
      bread_box: 1
    quality-chance: 0.05
    power-cost: 4.0
  saw_logs:
    machine: sawmill_t1
    input:
      wood_log: 1
    output:
      wood_plank: 4
      wood_scrap: 1
    power: 5.0
  burn_charcoal:
    machine: charcoal_kiln_t1
    input:
      wood_log: 2
    output:
      charcoal: 1
    power: 4.0
  scrap_to_biofuel:
    machine: grinder_t1
    input:
      wood_scrap: 4
    output:
      biofuel: 1
    power: 5.0
  process_fish:
    machine: fish_processor_t1
    input:
      raw_fish: 2
    output:
      processed_fish: 1
      fish_waste: 1
    power: 4.0
  press_fish_oil:
    machine: fish_processor_t1
    input:
      raw_fish: 3
    output:
      fish_oil: 1
      fish_waste: 1
    power: 4.0
  fish_waste_fertilizer:
    machine: grinder_t1
    input:
      fish_waste: 3
    output:
      fertilizer: 1
    power: 5.0
  animal_waste_fertilizer:
    machine: grinder_t1
    input:
      animal_waste: 3
    output:
      fertilizer: 1
    power: 5.0
