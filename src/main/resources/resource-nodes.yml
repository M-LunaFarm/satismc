resource-nodes:
  regeneration:
    enabled: true
    minimum-interval-ms: 1000
  nodes-per-island: 4
  default-new-island-nodes:
    - node-type: ORE
      resource-id: iron_ore
      purity-min: 0.6
      purity-max: 1.0
      max-remaining: 12000
      regen-per-hour: 300
      required-machine-tier: 1
      offset-x: 8
      offset-y: 0
      offset-z: 8
    - node-type: FOREST
      resource-id: wood_log
      purity-min: 0.5
      purity-max: 1.0
      max-remaining: 8000
      regen-per-hour: 250
      required-machine-tier: 1
      offset-x: -8
      offset-y: 0
      offset-z: 8
    - node-type: FISHING
      resource-id: raw_fish
      purity-min: 0.5
      purity-max: 1.0
      max-remaining: 6000
      regen-per-hour: 220
      required-machine-tier: 1
      offset-x: 8
      offset-y: 0
      offset-z: -8
    - node-type: PASTURE
      resource-id: animal_waste
      purity-min: 0.5
      purity-max: 1.0
      max-remaining: 6000
      regen-per-hour: 220
      required-machine-tier: 1
      offset-x: -8
      offset-y: 0
      offset-z: -8
